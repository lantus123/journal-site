name: Process Work Manuals

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout manuals from private repo
        uses: actions/checkout@v4
        with:
          repository: lantus123/nicu-manuals
          token: ${{ secrets.MANUALS_PAT }}
          path: config/manuals

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process manuals with Haiku keywords
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_manuals.py --dept newborn

      - name: Verify chunks generated
        run: |
          echo "Chunks file size: $(wc -c < data/newborn/manual_chunks.json) bytes"
          python -c "import json; d=json.load(open('data/newborn/manual_chunks.json')); print(f'Total chunks: {len(d)}')"
