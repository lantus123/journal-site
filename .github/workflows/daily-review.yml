name: Daily Journal Review

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email)'
        required: false
        default: 'false'
        type: boolean
      backfill_dates:
        description: 'Backfill dates (e.g. "2026-03-22 2026-03-23"), leave empty for normal run'
        required: false
        default: ''
        type: string
      backfill_dept:
        description: 'Department for backfill (newborn or cardiology)'
        required: false
        default: 'newborn'
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run journal review pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "NICU Journal Bot <nicu-journal@schedule.mmhped.org>"
          FEEDBACK_WEBHOOK_URL: ${{ secrets.FEEDBACK_WEBHOOK_URL }}
          FEEDBACK_SECRET: ${{ secrets.FEEDBACK_SECRET }}
          DIGEST_PASSWORD_NEWBORN: ${{ secrets.DIGEST_PASSWORD }}
          DIGEST_PASSWORD_CARDIOLOGY: ${{ secrets.DIGEST_PASSWORD_CARDIOLOGY }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          DIGEST_SITE_URL: "https://lantus123.github.io/journal-site"
        run: |
          if [ -n "${{ inputs.backfill_dates }}" ]; then
            python scripts/backfill_digest.py ${{ inputs.backfill_dates }} --dept ${{ inputs.backfill_dept }} --full
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            for dept in newborn cardiology; do
              echo "=== Running $dept (dry-run) ==="
              python main.py --dept $dept --dry-run
            done
          else
            for dept in newborn cardiology; do
              echo "=== Running $dept ==="
              python main.py --dept $dept
            done
          fi

      - name: Generate root landing page
        run: python scripts/generate_root_index.py

      - name: Commit updated data
        run: |
          git config user.name "Journal Review Bot"
          git config user.email "bot@noreply.github.com"
          git add data/newborn/ data/cardiology/ docs/
          git diff --staged --quiet || git commit -m "Update data: $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy digest to public site
        if: inputs.dry_run != true
        env:
          SITE_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          # Check if there are any HTML files to deploy
          if [ -z "$(find docs -name '*.html' 2>/dev/null)" ]; then
            echo "No HTML files to deploy"
            exit 0
          fi
          # Clone existing site to preserve old pages
          git clone --depth=1 https://x-access-token:${SITE_TOKEN}@github.com/lantus123/journal-site.git /tmp/site || true
          if [ ! -d /tmp/site/.git ]; then
            mkdir -p /tmp/site
            cd /tmp/site
            git init
            git checkout -b main
            git remote add origin https://x-access-token:${SITE_TOKEN}@github.com/lantus123/journal-site.git
          fi
          # Copy department directories and root index
          mkdir -p /tmp/site/newborn /tmp/site/cardiology
          cp -f docs/index.html /tmp/site/ 2>/dev/null || true
          cp -f docs/newborn/* /tmp/site/newborn/ 2>/dev/null || true
          cp -f docs/cardiology/* /tmp/site/cardiology/ 2>/dev/null || true
          cd /tmp/site
          git config user.name "Journal Review Bot"
          git config user.email "bot@noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Digest: $(date -u +%Y-%m-%d)"
          git push origin main --force
