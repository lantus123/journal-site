name: Daily Journal Review

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email)'
        required: false
        default: 'false'
        type: boolean

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run journal review pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: "NICU Journal Bot <nicu-journal@schedule.mmhped.org>"
          FEEDBACK_WEBHOOK_URL: ${{ secrets.FEEDBACK_WEBHOOK_URL }}
          FEEDBACK_SECRET: ${{ secrets.FEEDBACK_SECRET }}
          DIGEST_PASSWORD: ${{ secrets.DIGEST_PASSWORD }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          DIGEST_SITE_URL: "https://lantus123.github.io/nicu-journal-site"
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "Journal Review Bot"
          git config user.email "bot@noreply.github.com"
          git add data/pmid_cache.json data/knowledge_base.json data/on_demand_queue.json data/feedback.json
          git diff --staged --quiet || git commit -m "Update data: $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy digest to public site
        if: inputs.dry_run != true
        env:
          SITE_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
        run: |
          if [ ! -d "docs" ] || [ -z "$(ls -A docs/*.html 2>/dev/null)" ]; then
            echo "No HTML files to deploy"
            exit 0
          fi
          # Clone existing site first to preserve old pages
          git clone --depth=1 https://x-access-token:${SITE_TOKEN}@github.com/lantus123/nicu-journal-site.git /tmp/site || true
          if [ ! -d /tmp/site/.git ]; then
            mkdir -p /tmp/site
            cd /tmp/site
            git init
            git checkout -b main
            git remote add origin https://x-access-token:${SITE_TOKEN}@github.com/lantus123/nicu-journal-site.git
          fi
          # Copy new files over (preserves old HTML pages)
          cp -f docs/* /tmp/site/
          cd /tmp/site
          git config user.name "Journal Review Bot"
          git config user.email "bot@noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Digest: $(date -u +%Y-%m-%d)"
          git push origin main --force
