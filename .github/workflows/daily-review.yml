name: Daily Journal Review

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no email)'
        required: false
        default: 'false'
        type: boolean

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run journal review pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
          FEEDBACK_URL: ${{ secrets.FEEDBACK_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Commit updated cache and knowledge base
        run: |
          git config user.name "Journal Review Bot"
          git config user.email "bot@noreply.github.com"
          git add data/pmid_cache.json data/knowledge_base.json data/on_demand_queue.json
          git diff --staged --quiet || git commit -m "Update data: $(date -u +%Y-%m-%d)"
          git push
